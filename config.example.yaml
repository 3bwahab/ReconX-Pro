# ReconX-Pro Configuration File (TEMPLATE)
# =============================================================================
# Copy this file to `config.yaml` and fill in your own API keys:
#
#     cp config.example.yaml config.yaml
#
# `config.yaml` is git-ignored so your real keys are never committed.
# Environment variables (see README) override any values set here.
# =============================================================================

general:
  threads: 10
  timeout: 30
  output_dir: reports
  json_only: false
  user_agent: "ReconX-pro/2.0"

api_keys:
  # Shodan: https://account.shodan.io/
  shodan: ""

  # Censys: https://search.censys.io/account/api
  # Uses the new unified API token (not legacy id/secret)
  censys_token: ""

  # VirusTotal: https://www.virustotal.com/gui/my-apikey
  virustotal: ""

  # SecurityTrails: https://securitytrails.com/app/account
  securitytrails: ""

  # ProjectDiscovery Chaos: https://chaos.projectdiscovery.io/
  chaos: ""

  # GitHub Personal Access Token: https://github.com/settings/tokens
  github_token: ""

  # BuiltWith: https://api.builtwith.com/
  builtwith: ""

tools:
  subfinder:
    enabled: true
    path: subfinder
    timeout: 300

  httpx:
    enabled: true
    path: httpx
    timeout: 300
    rate_limit: 150

  naabu:
    enabled: true
    path: naabu
    timeout: 600
    top_ports: 1000

  nmap:
    enabled: true
    path: nmap
    timeout: 900
    arguments: "-sV -sC"

  ffuf:
    enabled: true
    path: ffuf
    timeout: 600
    wordlist: "/usr/share/wordlists/dirb/common.txt"
    rate_limit: 100

  waybackurls:
    enabled: true
    path: waybackurls
    timeout: 300

  gau:
    enabled: true
    path: gau
    timeout: 300

  gowitness:
    enabled: true
    path: gowitness
    timeout: 600

modules:
  passive:
    whois: true
    dns: true
    subdomains: true
    cert_transparency: true
    shodan: true
    censys: true
    virustotal: true
    securitytrails: true
    chaos: true
    github_recon: true
    builtwith: true
    wayback: true
    asn: true

  active:
    live_hosts: true
    port_scan: true
    dir_fuzz: true
    http_headers: true
    tech_detect: true
    screenshots: true
